<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #222831;
            color: #EEEEEE;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background-color: #393E46;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            font-size: 2.5em;
            color: #F8B400;
            margin-bottom: 20px;
            font-family: 'Roboto', sans-serif;
        }

        p {
            font-size: 1.5em;
            margin-bottom: 30px;
            color: #FFFFFF;
        }

        .error-message {
            color: #FF4D4D;
            font-size: 1.2em;
            font-weight: bold;
        }

        .signup-btn {
            background: linear-gradient(45deg, #00ADB5, #F8B400);
            color: #FFFFFF;
            font-size: 1.2em;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .signup-btn:hover {
            background: linear-gradient(45deg, #F8B400, #00ADB5);
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(0, 173, 181, 0.5);
        }

        footer {
            background-color: #222831;
            color: #FFFFFF;
            text-align: center;
            padding: 15px;
            width: 100%;
            position: absolute;
            bottom: 10px;
        }

        footer p {
            font-size: 1em;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Login Failed</h2>
        <p class="error-message">Login Failed! Please Signup to continue.</p>
        <a href="Signup.html"> <button class="signup-btn">Signup Now</button></a>
    </div>

    <footer>
        <p>&copy; 2025 सनातन शृति स्मृति ग्रन्थ: जगत. All rights reserved.</p>
    </footer>

</body>

</html>
