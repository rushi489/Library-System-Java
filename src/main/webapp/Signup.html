<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - सनातन शृति स्मृति ग्रन्थ: जगत</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: image("C:\Users\acer\Downloads\download.jpg");
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #EEEEEE;
            background-size: cover;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .login-container h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            color: #F8B400;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            background-color: #2C2C2C;
            color: #FFFFFF;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background-color: #3C3C3C;
        }

        .login-btn {
            background: linear-gradient(45deg, #00ADB5, #F8B400);
            color: #FFFFFF;
            font-size: 1.2em;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .login-btn:hover {
            background: linear-gradient(45deg, #F8B400, #00ADB5);
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(0, 173, 181, 0.5);
        }

        .forgot-password {
            display: block;
            color: #F8B400;
            margin-top: 15px;
            font-size: 1em;
            text-decoration: none;
        }

        .forgot-password:hover {
            color: #FFFFFF;
        }

        footer {
            background-color: #222831;
            color: #FFFFFF;
            text-align: center;
            padding: 15px;
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        footer p {
            font-size: 1em;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Signup</h2>
        <form action="Registration" method="POST">
            Enter Name   :<input type="text" name="username" placeholder="Username" required>
            Enter email  :<input type="email" name="email" placeholder="email" required> 
            Set password :<input type="password" name="password" placeholder="Password" required>
           <button type="submit" class="login-btn">Create Account</button>
        </form>
        <a href="LoginPage.html" class="Signup">Already have an account ? Login</a>
    </div>

    <footer>
        <p>&copy; 2025 सनातन शृति स्मृति ग्रन्थ: जगत. All rights reserved.</p>
    </footer>

</body>

</html>
